version: "3.8"

services:
  # 1. AI/STT 서비스 (백엔드)
  stt-ai:
    build: ./STT  # STT 폴더 안의 Dockerfile을 빌드
    container_name: stt-container
    expose:
      - "8000"
    volumes:
      - C:/stt/uploads:/app/input
      - C:/stt/output:/app/Audio_result
      - C:/stt/segments:/app/suspicious_segments
    # GPU를 사용한다면 여기에 deploy 설정을 추가할 수 있습니다.

  # 2. 웹 애플리케이션 서비스 (프론트엔드)
  # 2. 웹 애플리케이션 서비스 (프론트엔드)
  web:
    build: ./Web-Application-main
    container_name: web-container
    ports:
      - "8080:3000"  # 👈 여기를 8080으로 수정합니다!
    depends_on:
      - stt-ai
    environment:
      - NEXT_PUBLIC_API_URL=http://stt-ai:8000
      - HOSTNAME=0.0.0.0